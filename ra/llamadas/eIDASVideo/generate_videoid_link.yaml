parameters:
- name: id
  in: path
  description: The unique identifier of the Request
  required: true
  schema:
    type: string
  
responses:
  "200":
    description: Successful Response
    content:
      application/json:
        schema:
          type: object
          properties:
            pk:
              type: integer
              description: Document id

            status:
              type: string
              example: PENDING

            provider:
              type: integer

            videoid_link:
              type: string

            requests:
              type: array
              items:
                type: integer

            refusal_reason:
              type: string

            refusal_details:
              type: object
              nullable: true

            data:
              type: object

            video_identifier:
              type: string

            validation_services:
              type: object

            acceptance:
              type: object

            validation_operator:
              type: string
              nullable: true

            operation_urls:
              type: object

            esaw_requests_involved:
              type: boolean

            external_onboarding_link:
              type: string
              nullable: true

            manual_external_validation:
              type: boolean

        example:
          pk: 22614
          status: PENDING
          provider: 1
          videoid_link: ""
          requests:
            - 1526790
          refusal_reason: ""
          refusal_details: null
          data: {}
          video_identifier: d6139f83ecd2473bb49c8ca0a687adde
          validation_services: {}
          acceptance: {}
          validation_operator: null
          operation_urls: {}
          esaw_requests_involved: false
          external_onboarding_link: null
          manual_external_validation: false
